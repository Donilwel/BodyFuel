basePath: /api/v1
definitions:
  entities.ExerciseStatus:
    enum:
    - pending
    - in_progress
    - completed
    - skipped
    type: string
    x-enum-varnames:
    - ExerciseStatusPending
    - ExerciseStatusInProgress
    - ExerciseStatusCompleted
    - ExerciseStatusSkipped
  entities.ExerciseType:
    enum:
    - cardio
    - upper_body
    - lower_body
    - full_body
    - flexibility
    type: string
    x-enum-varnames:
    - Cardio
    - UpperBody
    - LowerBody
    - FullBody
    - Flexibility
  entities.LevelPreparation:
    enum:
    - beginner
    - medium
    - sportsman
    type: string
    x-enum-varnames:
    - Beginner
    - Medium
    - Sportsman
  entities.Lifestyle:
    enum:
    - not_active
    - active
    - sportive
    type: string
    x-enum-varnames:
    - NotActive
    - Active
    - Sportive
  entities.PlaceExercise:
    enum:
    - street
    - gym
    - home
    type: string
    x-enum-varnames:
    - Street
    - Gym
    - Home
  entities.Want:
    enum:
    - lose_weight
    - build_muscle
    - stay_fit
    type: string
    x-enum-varnames:
    - LoseWeight
    - BuildMuscle
    - StayFit
  entities.WorkoutsLevel:
    enum:
    - workout_light
    - workout_middle
    - workout_hard
    type: string
    x-enum-varnames:
    - WorkoutLight
    - WorkoutMiddle
    - WorkoutHard
  entities.WorkoutsStatus:
    enum:
    - workout_created
    - workout_done
    - workout_in_active
    - workout_failed
    type: string
    x-enum-varnames:
    - WorkoutStatusCreated
    - WorkoutStatusDone
    - WorkoutStatusInActive
    - WorkoutStatusFailed
  models.AddWorkoutExerciseRequest:
    properties:
      exercise_id:
        type: string
      modify_relax_time:
        maximum: 3600
        minimum: 0
        type: integer
      modify_reps:
        maximum: 1000
        minimum: 1
        type: integer
    required:
    - exercise_id
    type: object
  models.AnalyzePhotoRequest:
    properties:
      image_url:
        type: string
    required:
    - image_url
    type: object
  models.CreateFoodEntryRequest:
    properties:
      calories:
        maximum: 10000
        minimum: 0
        type: integer
      carbs:
        maximum: 500
        minimum: 0
        type: number
      date:
        type: string
      description:
        maxLength: 500
        type: string
      fat:
        maximum: 500
        minimum: 0
        type: number
      meal_type:
        enum:
        - breakfast
        - lunch
        - dinner
        - snack
        type: string
      photo_url:
        type: string
      protein:
        maximum: 500
        minimum: 0
        type: number
    required:
    - calories
    - description
    - meal_type
    type: object
  models.CreateUserCaloriesRequest:
    properties:
      calories:
        maximum: 10000
        minimum: 0
        type: integer
      date:
        type: string
      description:
        maxLength: 255
        type: string
    required:
    - calories
    - date
    type: object
  models.ErrorResponse:
    properties:
      '{route} error':
        example: '{method}: {crud}: error message'
        type: string
    type: object
  models.ExerciseRequestModel:
    properties:
      avg_calories_per:
        maximum: 1000
        minimum: 0
        type: number
      base_count_reps:
        maximum: 1000
        minimum: 1
        type: integer
      base_relax_time:
        maximum: 3600
        minimum: 0
        type: integer
      description:
        maxLength: 1000
        minLength: 1
        type: string
      level_preparation:
        enum:
        - beginner
        - medium
        - sportsman
        type: string
      link_gif:
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
      place_exercise:
        enum:
        - home
        - gym
        - street
        type: string
      steps:
        maximum: 100
        minimum: 1
        type: integer
      type_exercise:
        enum:
        - cardio
        - upper_body
        - lower_body
        - full_body
        - flexibility
        type: string
    required:
    - avg_calories_per
    - base_count_reps
    - base_relax_time
    - level_preparation
    - name
    - place_exercise
    - steps
    - type_exercise
    type: object
  models.ExerciseResponseModel:
    properties:
      avg_calories_per:
        type: number
      base_count_reps:
        type: integer
      base_relax_time:
        type: integer
      description:
        type: string
      id:
        type: string
      level_preparation:
        $ref: '#/definitions/entities.LevelPreparation'
      link_gif:
        type: string
      name:
        type: string
      place_exercise:
        $ref: '#/definitions/entities.PlaceExercise'
      steps:
        type: integer
      type_exercise:
        $ref: '#/definitions/entities.ExerciseType'
    type: object
  models.FoodEntryResponse:
    properties:
      calories:
        type: integer
      carbs:
        type: number
      created_at:
        type: string
      date:
        type: string
      description:
        type: string
      fat:
        type: number
      id:
        type: string
      meal_type:
        type: string
      photo_url:
        type: string
      protein:
        type: number
    type: object
  models.GenerateWorkoutRequest:
    properties:
      exercises_count:
        maximum: 20
        minimum: 4
        type: integer
      level:
        allOf:
        - $ref: '#/definitions/entities.WorkoutsLevel'
        enum:
        - workout_light
        - workout_middle
        - workout_hard
      place_exercise:
        allOf:
        - $ref: '#/definitions/entities.PlaceExercise'
        enum:
        - home
        - gym
        - street
      type_exercise:
        allOf:
        - $ref: '#/definitions/entities.ExerciseType'
        enum:
        - upper_body
        - lower_body
        - full_body
        - cardio
        - flexibility
    type: object
  models.IngredientResponse:
    properties:
      grams:
        type: number
      name:
        type: string
    type: object
  models.LoginRequestModel:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  models.MacroNutrientsResponse:
    properties:
      carbs:
        type: number
      fat:
        type: number
      protein:
        type: number
    type: object
  models.NutritionAnalysisResponse:
    properties:
      calories:
        type: integer
      carbs:
        type: number
      description:
        type: string
      fat:
        type: number
      protein:
        type: number
    type: object
  models.NutritionDiaryResponse:
    properties:
      date:
        type: string
      entries:
        items:
          $ref: '#/definitions/models.FoodEntryResponse'
        type: array
      total_calories:
        type: integer
      total_carbs:
        type: number
      total_fat:
        type: number
      total_protein:
        type: number
    type: object
  models.NutritionReportResponse:
    properties:
      avg_calories_per_day:
        type: number
      days:
        type: integer
      entries:
        items:
          $ref: '#/definitions/models.FoodEntryResponse'
        type: array
      from:
        type: string
      to:
        type: string
      total_calories:
        type: integer
      total_carbs:
        type: number
      total_fat:
        type: number
      total_protein:
        type: number
    type: object
  models.PresignAvatarRequest:
    properties:
      content_type:
        type: string
    required:
    - content_type
    type: object
  models.PresignAvatarResponse:
    properties:
      avatar_url:
        type: string
      object_key:
        type: string
      upload_url:
        type: string
    type: object
  models.RecipeResponse:
    properties:
      description:
        type: string
      id:
        type: string
      ingredients:
        items:
          $ref: '#/definitions/models.IngredientResponse'
        type: array
      macros:
        $ref: '#/definitions/models.MacroNutrientsResponse'
      name:
        type: string
      preparation_time:
        type: integer
    type: object
  models.RecommendationResponse:
    properties:
      description:
        type: string
      generated_at:
        type: string
      id:
        type: string
      is_read:
        type: boolean
      priority:
        type: integer
      type:
        type: string
    type: object
  models.RecoverPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  models.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  models.RegisterDeviceRequest:
    properties:
      device_token:
        type: string
      platform:
        enum:
        - ios
        - android
        type: string
    required:
    - device_token
    - platform
    type: object
  models.RegisterRequestModel:
    properties:
      email:
        type: string
      name:
        maxLength: 50
        minLength: 2
        type: string
      password:
        minLength: 6
        type: string
      phone:
        type: string
      surname:
        maxLength: 50
        minLength: 2
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    required:
    - email
    - name
    - password
    - phone
    - surname
    - username
    type: object
  models.ResetPasswordRequest:
    properties:
      code:
        type: string
      email:
        type: string
      new_password:
        minLength: 6
        type: string
    required:
    - code
    - email
    - new_password
    type: object
  models.SendVerificationCodeRequest:
    properties:
      code_type:
        enum:
        - email
        - phone
        type: string
    required:
    - code_type
    type: object
  models.SuccessResponse:
    properties:
      message:
        example: Successfully {action}
        type: string
    type: object
  models.TaskResponse:
    properties:
      attempts:
        type: integer
      attribute: {}
      created_at:
        type: string
      max_attempts:
        type: integer
      retry_at:
        type: string
      state:
        type: string
      type_nm:
        type: string
      updated_at:
        type: string
      uuid:
        type: string
    type: object
  models.TokenPairModel:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  models.UpdateExerciseRequestModel:
    properties:
      avg_calories_per:
        maximum: 1000
        minimum: 0
        type: number
      base_count_reps:
        maximum: 1000
        minimum: 1
        type: integer
      base_relax_time:
        maximum: 3600
        minimum: 0
        type: integer
      description:
        maxLength: 1000
        minLength: 1
        type: string
      level_preparation:
        enum:
        - beginner
        - medium
        - sportsman
        type: string
      link_gif:
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
      steps:
        maximum: 100
        minimum: 1
        type: integer
    type: object
  models.UpdateFoodEntryRequest:
    properties:
      calories:
        maximum: 10000
        minimum: 0
        type: integer
      carbs:
        maximum: 500
        minimum: 0
        type: number
      date:
        type: string
      description:
        maxLength: 500
        type: string
      fat:
        maximum: 500
        minimum: 0
        type: number
      meal_type:
        enum:
        - breakfast
        - lunch
        - dinner
        - snack
        type: string
      photo_url:
        type: string
      protein:
        maximum: 500
        minimum: 0
        type: number
    type: object
  models.UpdateUserCaloriesRequest:
    properties:
      calories:
        maximum: 10000
        minimum: 0
        type: integer
      date:
        type: string
      description:
        maxLength: 255
        type: string
    type: object
  models.UpdateWorkoutExerciseRequest:
    properties:
      calories:
        minimum: 0
        type: integer
      modify_relax_time:
        maximum: 3600
        minimum: 0
        type: integer
      modify_reps:
        maximum: 1000
        minimum: 1
        type: integer
      status:
        enum:
        - pending
        - in_progress
        - completed
        - skipped
        type: string
    type: object
  models.UpdateWorkoutRequest:
    properties:
      duration:
        minimum: 60000000000
        type: integer
      status:
        allOf:
        - $ref: '#/definitions/entities.WorkoutsStatus'
        enum:
        - pending
        - in_progress
        - completed
        - cancelled
    type: object
  models.UploadPhotoResponse:
    properties:
      photo_url:
        type: string
    type: object
  models.UserCaloriesResponse:
    properties:
      calories:
        type: integer
      created_at:
        type: string
      date:
        type: string
      description:
        type: string
      id:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.UserDeviceResponse:
    properties:
      created_at:
        type: string
      device_token:
        type: string
      id:
        type: string
      platform:
        type: string
    type: object
  models.UserInfoResponseModel:
    properties:
      created_at:
        type: string
      email:
        type: string
      name:
        type: string
      phone:
        type: string
      surname:
        type: string
