version: '3.8'

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bodyfuel-postgres
    environment:
      POSTGRES_DB:       backend_db
      POSTGRES_USER:     danila
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # NOTE: do NOT mount migrations here — goose (inside the app) handles them.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U danila -d backend_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bodyfuel-network
    restart: unless-stopped

  # ── MinIO (S3-compatible storage) ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: bodyfuel-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console  →  http://localhost:9001
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bodyfuel-network
    restart: unless-stopped

  # ── MinIO init: create bucket + set public-read policy ───────────────────
  minio-init:
    image: minio/mc:latest
    container_name: bodyfuel-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/avatars &&
        mc anonymous set download local/avatars &&
        echo 'MinIO: bucket avatars ready';
      "
    networks:
      - bodyfuel-network

  # ── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bodyfuel-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - bodyfuel-network
    restart: unless-stopped

  # ── Go application ────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bodyfuel-app
    ports:
      - "8080:8080"   # HTTP API
      - "8081:8081"   # Metrics (Prometheus)
    env_file:
      - .env          # put OPENAI_API_KEY, SENDGRID_API_KEY, etc. here
    environment:
      # ── Postgres ─────────────────────────────────────────────────────────
      POSTGRES_HOST:     postgres
      POSTGRES_USERNAME: danila
      POSTGRES_PASSWORD: postgres
      POSTGRES_DATABASE: backend_db

      # ── MinIO ─────────────────────────────────────────────────────────────
      MINIO_ENDPOINT:   http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET:     avatars
      MINIO_REGION:     us-east-1
      # PUBLIC_URL остаётся localhost — мобильный клиент скачивает фото напрямую
      MINIO_PUBLIC_URL: http://localhost:9000/avatars

      # ── Redis ─────────────────────────────────────────────────────────────
      REDIS_ADDR: redis:6379

    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - bodyfuel-network
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  minio-data:
    driver: local

networks:
  bodyfuel-network:
    driver: bridge
