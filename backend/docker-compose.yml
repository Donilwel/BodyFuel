version: '3.8'

services:
  # Go приложение
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bodyfuel-app
    ports:
      - "8080:8080"  # HTTP API
      - "8081:8081"  # Metrics
    environment:
      - APP_HTTP_SERVER_HOST=0.0.0.0
      - APP_HTTP_SERVER_PORT=8080
      - APP_HTTP_SERVER_API_HOST=app:8080
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=backend_db
      - POSTGRES_USER=danila
      - POSTGRES_PASSWORD=postgres
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=avatars
      - MINIO_REGION=us-east-1
      - MINIO_PUBLIC_URL=http://localhost:9000/avatars
      - SAGE_LEVEL=info
      - SAGE_DEPLOYMENT_ENVIRONMENT=test
      - SAGE_SYSTEM=bodyfuel
      - SAGE_POD_NAME=bodyfuel-0
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - bodyfuel-network
    restart: unless-stopped

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: bodyfuel-postgres
    environment:
      - POSTGRES_DB=backend_db
      - POSTGRES_USER=danila
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U danila -d backend_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bodyfuel-network
    restart: unless-stopped

  # MinIO (S3 Storage)
  minio:
    image: minio/minio:latest
    container_name: bodyfuel-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"  # API порт
      - "9001:9001"  # Web Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - bodyfuel-network
    restart: unless-stopped

  # Автоматическое создание bucket'а в MinIO
  create-bucket:
    image: minio/mc:latest
    container_name: bodyfuel-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/avatars --ignore-existing;
      mc policy set download myminio/avatars;
      echo 'Bucket avatars created/verified';
      exit 0;
      "
    networks:
      - bodyfuel-network

volumes:
  postgres-data:
    driver: local
  minio-data:
    driver: local

networks:
  bodyfuel-network:
    driver: bridge